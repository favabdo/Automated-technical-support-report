<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>تسجيل الدخول</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2e3250;
      --accent: #4f6ef7;
      --accent2: #7c3aed;
      --text: #e8eaf6;
      --muted: #8b91b0;
      --red: #ef4444;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo .icon {
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-logo h1 {
      font-size: 20px;
      font-weight: 800;
    }

    .login-logo p {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .form-group .input-wrap {
      position: relative;
    }

    .form-group .input-wrap i {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 40px 12px 14px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
      margin-top: 8px;
    }

    .btn-login:hover {
      opacity: .88;
    }

    .btn-visitor {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all .2s;
      margin-top: 10px;
    }

    .btn-visitor:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .error-msg {
      background: rgba(239, 68, 68, .12);
      border: 1px solid rgba(239, 68, 68, .2);
      color: var(--red);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>

<body>
  {% load static %}
  <div class="login-box">
    <div class="login-logo">
      <div class="icon">
        <img src="{% static 'images/NTLogo.png' %}" style="width:120px; object-fit:contain; margin-bottom:8px;">
      </div>
      <h1>Nile Techno</h1>
      <p>سجّل دخولك للمتابعة</p>
    </div>

    {% if messages %}
    {% for msg in messages %}
    <div class="error-msg"><i class="fa-solid fa-circle-xmark"></i> {{ msg }}</div>
    {% endfor %}
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="action" value="login">
      <div class="form-group">
        <label>الـ ID الخاص بك</label>
        <div class="input-wrap">
          <i class="fa-solid fa-id-badge"></i>
          <input type="text" name="agent_id" placeholder="أدخل الـ ID" required autofocus>
        </div>
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <div class="input-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" name="password" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="fa-solid fa-right-to-bracket"></i> دخول
      </button>
    </form>

    <div class="divider">أو</div>

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="action" value="visitor">
      <button type="submit" class="btn-visitor">
        <i class="fa-solid fa-eye"></i> دخول كزائر
      </button>
    </form>
  </div>
</body>

</html>
