    }

    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right,
          rgba(3, 10, 25, 0.85) 0%,
          rgba(3, 10, 25, 0.68) 40%,
          rgba(3, 10, 25, 0.08) 68%,
          rgba(3, 10, 25, 0.0) 100%);
    }

    .card-wrap {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      height: 100vh;
      padding-right: 6vw;
    }

    .card {
      width: 355px;
      background: rgba(4, 14, 32, 0.60);
      border: 1px solid rgba(0, 185, 220, 0.22);
      border-radius: 22px;
      padding: 36px 32px 28px;
      position: relative;
      backdrop-filter: blur(24px) saturate(1.6);
      -webkit-backdrop-filter: blur(24px) saturate(1.6);
      box-shadow: 0 0 0 1px rgba(0, 200, 230, 0.06) inset, 0 28px 65px rgba(0, 0, 0, 0.65), 0 0 40px rgba(10, 80, 180, 0.12);
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 16%;
      right: 16%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 210, 240, 0.7), transparent);
    }

    .logo {
      text-align: center;
      margin-bottom: 22px
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 1px
    }

    .logo-text span {
      color: #3ad47a
    }

    .logo p {
      font-size: 9.5px;
      color: rgba(120, 175, 210, 0.48);
      margin-top: 4px;
      letter-spacing: .09em;
      text-transform: uppercase
    }

    .sec-title {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: rgba(200, 230, 255, 0.8);
      margin-bottom: 20px;
      position: relative;
    }

    .sec-title::before,
    .sec-title::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 28%;
      height: 1px;
      background: rgba(0, 175, 215, 0.18);
    }

    .sec-title::before {
      right: 0
    }

    .sec-title::after {
      left: 0
    }

    .field {
      margin-bottom: 13px
    }

    .field label {
      display: block;
      font-size: 11.5px;
      font-weight: 600;
      color: rgba(120, 175, 210, 0.75);
      margin-bottom: 6px
    }

    .wrap {
      position: relative
    }

    .wrap i {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(90, 150, 195, 0.55);
      font-size: 13px;
      pointer-events: none
    }

    .wrap input {
      width: 100%;
      padding: 10px 36px 10px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 165, 205, 0.22);
      border-radius: 9px;
      color: #e0f0ff;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    .wrap input::placeholder {
      color: rgba(140, 185, 220, 0.28)
    }

    .wrap input:focus {
      border-color: rgba(0, 200, 230, 0.55);
      box-shadow: 0 0 0 3px rgba(0, 200, 230, 0.09)
    }

    .btn-main {
      width: 100%;
      padding: 11px;
      border-radius: 9px;
      border: none;
      background: linear-gradient(135deg, #0a6abf 0%, #053d7a 100%);
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      box-shadow: 0 4px 18px rgba(10, 90, 190, 0.42);
      transition: opacity .2s, transform .15s;
    }

    .btn-main:hover {
      opacity: .88;
      transform: translateY(-1px)
    }

    .btn-main:active {
      transform: scale(.985)
    }

    .or {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0;
      color: rgba(100, 145, 175, 0.4);
      font-size: 11px
    }

    .or::before,
    .or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0, 155, 195, 0.13)
    }

    .btn-sec {
      width: 100%;
      padding: 9px;
      border-radius: 9px;
      background: rgba(50, 200, 110, 0.07);
      border: 1px solid rgba(50, 200, 110, 0.22);
      color: #6de89a;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all .2s;
    }

    .btn-sec:hover {
      background: rgba(50, 200, 110, 0.14);
      border-color: rgba(50, 200, 110, 0.45)
    }

    .foot {
      text-align: center;
      margin-top: 16px;
      font-size: 10px;
      color: rgba(90, 130, 160, 0.28)
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="card-wrap">
    <div class="card">
      <div class="logo">
        <img src="{% static 'images/NTLogo.png' %}"
          style="width:115px;filter:drop-shadow(0 0 10px rgba(0,200,230,0.35))">
        <p>Enterprise Resource Planning System</p>
      </div>
      {% if messages %}{% for msg in messages %}
      <div
        style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#fca5a5;border-radius:9px;padding:10px 13px;font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:8px;">
        <i class="fa-solid fa-circle-xmark"></i> {{ msg }}
      </div>
      {% endfor %}{% endif %}
      <div class="sec-title">تسجيل الدخول</div>
      <form method="post">
        <div class="field">
          <label>الـ ID الخاص بك</label>
          <div class="wrap">
            <i class="fa-solid fa-id-badge"></i>
            {% csrf_token %}
            <input type="hidden" name="action" value="login">
            <input type="text" name="agent_id" placeholder="أدخل الـ ID" required autofocus>
          </div>
        </div>
        <div class="field">
          <label>كلمة المرور</label>
          <div class="wrap">
            <i class="fa-solid fa-lock"></i>
            <input type="password" name="password" placeholder="••••••••" required>
          </div>
        </div>
        <button type="submit" class="btn-main">
          <i class="fa-solid fa-right-to-bracket"></i>&nbsp; دخول
        </button>
      </form>
      <div class="or">أو</div>
      <form method="post">
        {% csrf_token %}
        <input type="hidden" name="action" value="visitor">
        <button type="submit" class="btn-sec">
          <i class="fa-solid fa-eye"></i>&nbsp; دخول كزائر
        </button>
      </form>
      <p class="foot">© 2026 Nile Techno — All rights reserved</p>
    </div>
  </div>
</body>

</html>
